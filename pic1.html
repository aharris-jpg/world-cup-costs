<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0F1B26; font-family: system-ui, sans-serif; }
figure { width: 100%; }
.top-bar {
  height: 4px;
  background: linear-gradient(90deg, #1B2B3A 0%, #C8902C 40%, #F0BA55 60%, #C8902C 100%);
}
figure img {
  display: block;
  width: 100%;
  height: 380px;
  object-fit: cover;
}
figcaption {
  background: #1B2B3A;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
}
.cap-text {
  font-size: 12px;
  color: #7A909E;
  line-height: 1.6;
  font-weight: 500;
}
.cap-text strong { color: #CBD5DC; font-weight: 700; }
.cap-credit {
  font-size: 11px;
  color: #3D5568;
  font-weight: 500;
  white-space: nowrap;
  flex-shrink: 0;
  padding-top: 1px;
}
</style>
</head>
<body>
<figure>
  <div class="top-bar"></div>
  <img
    src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=1400&q=80&fit=crop"
    alt="Football stadium packed with supporters under floodlights at night"
    loading="lazy"
    onerror="this.style.height='200px';this.style.background='#1B2B3A';this.removeAttribute('src')"
  >
  <figcaption>
    <span class="cap-text">For fans from the study's most expensive nations, reaching the stadium costs <strong>upward of $35,000 for two people</strong> before a single knockout game is played. Iraq tops the rankings at $35,727 for the group stage alone.</span>
    <span class="cap-credit">Photo: Unsplash</span>
  </figcaption>
</figure>
</body>
</html>
