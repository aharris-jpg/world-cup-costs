<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0F1B26; font-family: system-ui, sans-serif; }
figure { width: 100%; }
.top-bar {
  height: 4px;
  background: linear-gradient(90deg, #1B2B3A 0%, #C8902C 40%, #F0BA55 60%, #C8902C 100%);
}
figure img {
  display: block;
  width: 100%;
  height: 380px;
  object-fit: cover;
}
figcaption {
  background: #1B2B3A;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
}
.cap-text {
  font-size: 12px;
  color: #7A909E;
  line-height: 1.6;
  font-weight: 500;
}
.cap-text strong { color: #CBD5DC; font-weight: 700; }
.cap-credit {
  font-size: 11px;
  color: #3D5568;
  font-weight: 500;
  white-space: nowrap;
  flex-shrink: 0;
  padding-top: 1px;
}
</style>
</head>
<body>
<figure>
  <div class="top-bar"></div>
  <img
    src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1400&q=80&fit=crop"
    alt="Airport departure lounge with travellers waiting at gates"
    loading="lazy"
    onerror="this.style.height='200px';this.style.background='#1B2B3A';this.removeAttribute('src')"
  >
  <figcaption>
    <span class="cap-text">Flights account for <strong>55–60% of the total trip cost</strong> for nations like Iraq, Jordan, Iran, and Australia. South Africa fans face the highest average flight bill of any English-speaking nation at <strong>$10,775 for two</strong> — while Canada fans pay just $2,178.</span>
    <span class="cap-credit">Photo: Unsplash</span>
  </figcaption>
</figure>
</body>
</html>
